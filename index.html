<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Débuts — Apprendre en s'amusant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Comic Sans MS', system-ui, sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 560px;
    padding: 28px;
    text-align: center;
  }

  h1 { font-size: 1.7rem; color: #4a3f8f; margin-bottom: 6px; }
  .subtitle { color: #888; margin-bottom: 22px; font-size: 1rem; }

  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .menu-btn {
    border: none;
    border-radius: 16px;
    padding: 20px 10px;
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
  .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
  .menu-btn .emoji { display: block; font-size: 2rem; margin-bottom: 6px; }

  .c-jours    { background: linear-gradient(135deg, #f6a821, #f68f21); }
  .c-mois     { background: linear-gradient(135deg, #21b3f6, #2179f6); }
  .c-add      { background: linear-gradient(135deg, #4cd964, #2eb350); }
  .c-sub      { background: linear-gradient(135deg, #ff6b6b, #e04545); }
  .c-mul      { background: linear-gradient(135deg, #a76bff, #7d45e0); }
  .c-div      { background: linear-gradient(135deg, #ff6bd5, #e045a8); }

  .hidden { display: none !important; }

  /* --- Sous-menu / niveaux --- */
  .choice-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
  .big-btn {
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #667eea, #764ba2);
    transition: transform 0.15s;
    font-family: inherit;
  }
  .big-btn:hover { transform: scale(1.03); }
  .big-btn.secondary { background: #eee; color: #555; }

  /* --- Révision --- */
  .learn-list { list-style: none; margin: 14px 0; text-align: left; }
  .learn-list li {
    background: #f4f2ff;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #4a3f8f;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .learn-list .num {
    background: #667eea;
    color: #fff;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  /* --- Quiz --- */
  .progress-bar { background: #eee; border-radius: 10px; height: 12px; margin-bottom: 18px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 0%; transition: width 0.3s; }

  .quiz-info { display: flex; justify-content: space-between; color: #888; font-size: 0.9rem; margin-bottom: 12px; }

  .question {
    font-size: 1.5rem;
    font-weight: 700;
    color: #333;
    margin: 18px 0 24px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .answer-btn {
    border: 3px solid #e2ddff;
    background: #faf9ff;
    border-radius: 14px;
    padding: 16px 8px;
    font-size: 1.2rem;
    font-weight: 700;
    color: #4a3f8f;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .answer-btn:hover:not(:disabled) { border-color: #667eea; background: #efeaff; }
  .answer-btn:disabled { cursor: default; }
  .answer-btn.correct { background: #d4f8dc; border-color: #2eb350; color: #1d7534; animation: pop 0.3s; }
  .answer-btn.wrong { background: #ffe0e0; border-color: #e04545; color: #a52727; animation: shake 0.3s; }

  @keyframes pop { 50% { transform: scale(1.08); } }
  @keyframes shake {
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .feedback { min-height: 34px; margin-top: 16px; font-size: 1.15rem; font-weight: 700; }
  .feedback.good { color: #2eb350; }
  .feedback.bad { color: #e04545; }

  /* --- Fin --- */
  .stars { font-size: 3rem; margin: 12px 0; letter-spacing: 6px; }
  .final-score { font-size: 1.4rem; font-weight: 700; color: #4a3f8f; margin-bottom: 8px; }
  .final-msg { color: #666; margin-bottom: 20px; font-size: 1.05rem; }

  .back-link {
    display: inline-block;
    margin-top: 18px;
    background: none;
    border: none;
    color: #999;
    font-size: 0.95rem;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }

  @media (max-width: 420px) {
    .answers, .menu-grid { grid-template-columns: 1fr; }
    .question { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<div class="card">

  <!-- ÉCRAN : MENU PRINCIPAL -->
  <div id="screen-menu">
    <h1>🎓 Mes Débuts</h1>
    <p class="subtitle">Choisis ce que tu veux apprendre !</p>
    <div class="menu-grid">
      <button class="menu-btn c-jours" onclick="openCategory('jours')"><span class="emoji">📅</span>Les jours</button>
      <button class="menu-btn c-mois" onclick="openCategory('mois')"><span class="emoji">🗓️</span>Les mois</button>
      <button class="menu-btn c-add" onclick="openLevels('addition')"><span class="emoji">➕</span>Addition</button>
      <button class="menu-btn c-sub" onclick="openLevels('soustraction')"><span class="emoji">➖</span>Soustraction</button>
      <button class="menu-btn c-mul" onclick="openLevels('multiplication')"><span class="emoji">✖️</span>Multiplication</button>
      <button class="menu-btn c-div" onclick="openLevels('division')"><span class="emoji">➗</span>Division</button>
    </div>
  </div>

  <!-- ÉCRAN : SOUS-MENU JOURS / MOIS -->
  <div id="screen-category" class="hidden">
    <h1 id="category-title"></h1>
    <div class="choice-list">
      <button class="big-btn" onclick="openLearn()">📖 Réviser d'abord</button>
      <button class="big-btn" onclick="startQuizFromCategory()">🎯 Faire le quiz</button>
    </div>
    <button class="back-link" onclick="showScreen('menu')">← Retour au menu</button>
  </div>

  <!-- ÉCRAN : RÉVISION -->
  <div id="screen-learn" class="hidden">
    <h1 id="learn-title"></h1>
    <ul class="learn-list" id="learn-list"></ul>
    <button class="big-btn" onclick="startQuizFromCategory()">🎯 Je suis prêt·e, quiz !</button>
    <button class="back-link" onclick="showScreen('menu')">← Retour au menu</button>
  </div>

  <!-- ÉCRAN : NIVEAUX (maths) -->
  <div id="screen-levels" class="hidden">
    <h1 id="levels-title"></h1>
    <p class="subtitle">Choisis ton niveau</p>
    <div class="choice-list">
      <button class="big-btn" onclick="startMathQuiz(1)">🌱 Facile</button>
      <button class="big-btn" onclick="startMathQuiz(2)">🌿 Moyen</button>
      <button class="big-btn" onclick="startMathQuiz(3)">🌳 Difficile</button>
    </div>
    <button class="back-link" onclick="showScreen('menu')">← Retour au menu</button>
  </div>

  <!-- ÉCRAN : QUIZ -->
  <div id="screen-quiz" class="hidden">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="quiz-info">
      <span id="quiz-counter"></span>
      <span id="quiz-score"></span>
    </div>
    <div class="question" id="question-text"></div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="back-link" onclick="showScreen('menu')">← Abandonner</button>
  </div>

  <!-- ÉCRAN : RÉSULTAT -->
  <div id="screen-end" class="hidden">
    <h1>Quiz terminé !</h1>
    <div class="stars" id="end-stars"></div>
    <div class="final-score" id="end-score"></div>
    <p class="final-msg" id="end-msg"></p>
    <div class="choice-list">
      <button class="big-btn" onclick="replayQuiz()">🔁 Rejouer</button>
      <button class="big-btn secondary" onclick="showScreen('menu')">🏠 Menu principal</button>
    </div>
  </div>

</div>

<script>
const JOURS = ['lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi', 'dimanche'];
const MOIS = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin',
              'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
const NB_QUESTIONS = 10;

let currentCategory = null;   // 'jours' | 'mois' | 'addition' | ...
let currentLevel = 1;
let questions = [];
let questionIndex = 0;
let score = 0;

// ---------- utilitaires ----------
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[rand(0, arr.length - 1)]; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = rand(0, i);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function ordinal(n) { return n === 1 ? '1er' : n + 'e'; }

function showScreen(name) {
  ['menu', 'category', 'learn', 'levels', 'quiz', 'end'].forEach(s => {
    document.getElementById('screen-' + s).classList.toggle('hidden', s !== name);
  });
}

// ---------- navigation ----------
function openCategory(cat) {
  currentCategory = cat;
  document.getElementById('category-title').textContent =
    cat === 'jours' ? '📅 Les jours de la semaine' : '🗓️ Les mois de l\'année';
  showScreen('category');
}

function openLearn() {
  const list = currentCategory === 'jours' ? JOURS : MOIS;
  document.getElementById('learn-title').textContent =
    currentCategory === 'jours' ? '📖 Les 7 jours de la semaine' : '📖 Les 12 mois de l\'année';
  document.getElementById('learn-list').innerHTML = list
    .map((item, i) => `<li><span class="num">${i + 1}</span>${cap(item)}</li>`)
    .join('');
  showScreen('learn');
}

function openLevels(op) {
  currentCategory = op;
  const titles = {
    addition: '➕ Addition',
    soustraction: '➖ Soustraction',
    multiplication: '✖️ Multiplication',
    division: '➗ Division'
  };
  document.getElementById('levels-title').textContent = titles[op];
  showScreen('levels');
}

// ---------- génération des questions : jours & mois ----------
function makeSequenceQuestion(list, labels) {
  const type = pick(['apres', 'avant', 'position', 'compte', 'premier', 'dernier']);
  const wrap = i => ((i % list.length) + list.length) % list.length;

  if (type === 'apres') {
    const i = rand(0, list.length - 1);
    return {
      q: `Quel ${labels.unit} vient juste après ${list[i]} ?`,
      answer: cap(list[wrap(i + 1)]),
      choices: distinctFrom(list, wrap(i + 1), 3).map(cap)
    };
  }
  if (type === 'avant') {
    const i = rand(0, list.length - 1);
    return {
      q: `Quel ${labels.unit} vient juste avant ${list[i]} ?`,
      answer: cap(list[wrap(i - 1)]),
      choices: distinctFrom(list, wrap(i - 1), 3).map(cap)
    };
  }
  if (type === 'position') {
    const i = rand(0, list.length - 1);
    return {
      q: `Quel est le ${ordinal(i + 1)} ${labels.unit} de ${labels.container} ?`,
      answer: cap(list[i]),
      choices: distinctFrom(list, i, 3).map(cap)
    };
  }
  if (type === 'compte') {
    const n = list.length;
    return {
      q: `Combien y a-t-il de ${labels.unitPlural} dans ${labels.container2} ?`,
      answer: String(n),
      choices: shuffle([n - 2, n - 1, n + 1, n + 2]).slice(0, 3).map(String)
    };
  }
  if (type === 'premier') {
    return {
      q: `Quel est le premier ${labels.unit} de ${labels.container} ?`,
      answer: cap(list[0]),
      choices: distinctFrom(list, 0, 3).map(cap)
    };
  }
  // dernier
  return {
    q: `Quel est le dernier ${labels.unit} de ${labels.container} ?`,
    answer: cap(list[list.length - 1]),
    choices: distinctFrom(list, list.length - 1, 3).map(cap)
  };
}

// renvoie 3 éléments de la liste différents de l'index donné
function distinctFrom(list, excludeIndex, count) {
  const others = list.filter((_, i) => i !== excludeIndex);
  return shuffle(others).slice(0, count);
}

function makeJoursQuestion() {
  return makeSequenceQuestion(JOURS, {
    unit: 'jour', unitPlural: 'jours',
    container: 'la semaine', container2: 'une semaine'
  });
}

function makeMoisQuestion() {
  return makeSequenceQuestion(MOIS, {
    unit: 'mois', unitPlural: 'mois',
    container: 'l\'année', container2: 'une année'
  });
}

// ---------- génération des questions : maths ----------
function makeMathQuestion(op, level) {
  let a, b, result, symbol;

  if (op === 'addition') {
    const max = [10, 20, 100][level - 1];
    a = rand(1, max); b = rand(1, max);
    result = a + b; symbol = '+';
  } else if (op === 'soustraction') {
    const max = [10, 20, 100][level - 1];
    a = rand(1, max); b = rand(1, max);
    if (b > a) [a, b] = [b, a]; // jamais de résultat négatif
    result = a - b; symbol = '−';
  } else if (op === 'multiplication') {
    const max = [5, 10, 12][level - 1];
    a = rand(1, max); b = rand(1, 10);
    result = a * b; symbol = '×';
  } else { // division exacte
    const max = [5, 10, 12][level - 1];
    b = rand(2, max);
    result = rand(1, max);
    a = b * result; symbol = '÷';
  }

  return {
    q: `${a} ${symbol} ${b} = ?`,
    answer: String(result),
    choices: numberDistractors(result, 3).map(String)
  };
}

// 3 mauvaises réponses proches du résultat, uniques et positives
function numberDistractors(answer, count) {
  const set = new Set();
  let guard = 0;
  while (set.size < count && guard < 200) {
    guard++;
    const delta = rand(1, Math.max(3, Math.round(Math.abs(answer) * 0.3)));
    const candidate = answer + (Math.random() < 0.5 ? -delta : delta);
    if (candidate >= 0 && candidate !== answer) set.add(candidate);
  }
  // filet de sécurité si le hasard n'a pas suffi
  let extra = answer + count + 1;
  while (set.size < count) set.add(extra++);
  return [...set];
}

// ---------- déroulement du quiz ----------
function buildQuestions() {
  const qs = [];
  const seen = new Set();
  let guard = 0;
  while (qs.length < NB_QUESTIONS && guard < 300) {
    guard++;
    let q;
    if (currentCategory === 'jours') q = makeJoursQuestion();
    else if (currentCategory === 'mois') q = makeMoisQuestion();
    else q = makeMathQuestion(currentCategory, currentLevel);
    if (seen.has(q.q)) continue; // éviter deux fois la même question
    seen.add(q.q);
    qs.push(q);
  }
  return qs;
}

function startQuizFromCategory() {
  startQuiz();
}

function startMathQuiz(level) {
  currentLevel = level;
  startQuiz();
}

function startQuiz() {
  questions = buildQuestions();
  questionIndex = 0;
  score = 0;
  showScreen('quiz');
  renderQuestion();
}

function replayQuiz() {
  startQuiz();
}

function renderQuestion() {
  const q = questions[questionIndex];
  document.getElementById('progress-fill').style.width =
    (questionIndex / NB_QUESTIONS * 100) + '%';
  document.getElementById('quiz-counter').textContent =
    `Question ${questionIndex + 1} / ${NB_QUESTIONS}`;
  document.getElementById('quiz-score').textContent = `⭐ ${score}`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const options = shuffle([q.answer, ...q.choices]);
  document.getElementById('answers').innerHTML = options
    .map(opt => `<button class="answer-btn" onclick="selectAnswer(this)">${opt}</button>`)
    .join('');
}

function selectAnswer(btn) {
  const q = questions[questionIndex];
  const buttons = document.querySelectorAll('.answer-btn');
  buttons.forEach(b => b.disabled = true);

  const feedback = document.getElementById('feedback');
  if (btn.textContent === q.answer) {
    btn.classList.add('correct');
    score++;
    feedback.textContent = pick(['✅ Bravo !', '✅ Super !', '✅ Exact !', '✅ Génial !']);
    feedback.classList.add('good');
  } else {
    btn.classList.add('wrong');
    buttons.forEach(b => { if (b.textContent === q.answer) b.classList.add('correct'); });
    feedback.textContent = `❌ La bonne réponse était : ${q.answer}`;
    feedback.classList.add('bad');
  }
  document.getElementById('quiz-score').textContent = `⭐ ${score}`;

  setTimeout(() => {
    questionIndex++;
    if (questionIndex < NB_QUESTIONS) renderQuestion();
    else showEnd();
  }, btn.textContent === q.answer ? 900 : 1800);
}

function showEnd() {
  showScreen('end');
  const ratio = score / NB_QUESTIONS;
  const stars = ratio === 1 ? '⭐⭐⭐⭐⭐'
              : ratio >= 0.8 ? '⭐⭐⭐⭐'
              : ratio >= 0.6 ? '⭐⭐⭐'
              : ratio >= 0.4 ? '⭐⭐'
              : '⭐';
  const msg = ratio === 1 ? 'Score parfait, tu es un champion ! 🏆'
            : ratio >= 0.8 ? 'Excellent travail, continue comme ça ! 🎉'
            : ratio >= 0.6 ? 'Bien joué ! Encore un petit effort ! 💪'
            : ratio >= 0.4 ? 'Pas mal ! Entraîne-toi encore un peu ! 🙂'
            : 'Courage, réessaie : c\'est en s\'entraînant qu\'on apprend ! 🌱';
  document.getElementById('end-stars').textContent = stars;
  document.getElementById('end-score').textContent = `${score} / ${NB_QUESTIONS} bonnes réponses`;
  document.getElementById('end-msg').textContent = msg;
}
</script>

</body>
</html>
