name: iOS TestFlight

# Build signé + envoi sur TestFlight via fastlane.
# Déclenché manuellement, ou en poussant un tag « ios-v* » (ex. ios-v1.0.0).
# Nécessite les secrets décrits dans ios/CI.md.
on:
  workflow_dispatch:
  push:
    tags:
      - 'ios-v*'

jobs:
  testflight:
    runs-on: macos-15
    env:
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Sélectionner Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Installer fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios/MesDebuts

      - name: Build & envoi sur TestFlight
        working-directory: ios/MesDebuts
        run: bundle exec fastlane beta
